<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bumper Pool — Justin vs Morpheus</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; font-family: 'Georgia', serif; color: #f0e6d3; padding: 8px;
    -webkit-user-select: none; user-select: none;
  }
  h1 { font-size: 1.2em; letter-spacing: 2px; text-transform: uppercase; color: #c9a84c; margin-bottom: 5px; }
  #scoreboard {
    display: flex; gap: 16px; margin-bottom: 6px;
    background: rgba(0,0,0,0.4); padding: 6px 16px; border-radius: 8px;
    border: 1px solid #c9a84c44; align-items: center;
  }
  .pi { text-align: center; min-width: 80px; }
  .pn { font-size: 0.9em; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
  .pn.red { color: #e05555; } .pn.wht { color: #ccc; }
  .bd { font-size: 1em; margin-top: 1px; }
  #tb { text-align: center; min-width: 110px; }
  #ti { font-size: 0.82em; color: #c9a84c; }
  #pm { font-size: 0.68em; color: #999; margin-top: 2px; min-height: 12px; }
  canvas { border-radius: 6px; cursor: crosshair; touch-action: none; max-width: 100%; }
  #ins { font-size: 0.68em; color: #555; margin-top: 5px; text-align: center; }
  #ov {
    display: none; position: fixed; top:0;left:0;right:0;bottom:0;
    background: rgba(0,0,0,0.88); flex-direction: column; align-items: center;
    justify-content: center; z-index: 10;
  }
  #ov.show { display: flex; }
  #wt { font-size: 2em; color: #c9a84c; text-shadow: 0 0 20px rgba(201,168,76,0.8); margin-bottom: 16px; text-align: center; }
  #rb {
    background: #c9a84c; color: #1a1a2e; border: none; padding: 10px 28px;
    font-size: 1em; font-family: 'Georgia', serif; text-transform: uppercase;
    letter-spacing: 2px; border-radius: 4px; cursor: pointer; font-weight: bold;
  }
</style>
</head>
<body>
<h1>⚫ Bumper Pool ⚫</h1>
<div id="scoreboard">
  <div class="pi"><div class="pn red">Justin 🔴</div><div class="bd" id="jd">●●●●●</div></div>
  <div id="tb"><div id="ti">—</div><div id="pm"></div></div>
  <div class="pi"><div class="pn wht">Morpheus ⚪</div><div class="bd" id="md">●●●●●</div></div>
</div>
<canvas id="c"></canvas>
<div id="ins">Tap your ball · Drag away to aim · Release to shoot</div>
<div id="ov"><div id="wt"></div><button id="rb" onclick="initGame()">Play Again</button></div>

<script>
const C = document.getElementById('c');
const X = C.getContext('2d');

// Table dimensions (logical coords)
const W = 440, H = 680;
const RAIL = 30;
const IL = RAIL, IR = W-RAIL, IT = RAIL, IB = H-RAIL;
const CX = W/2, CY = H/2;
const BR = 10;   // ball radius
const BPR = 13;  // bumper radius
const PR = 15;   // pocket radius (visual)
const PSINK = 18; // pocket sink zone

let sc = 1;
function resize() {
  const mw = Math.min(window.innerWidth-12, W);
  const mh = window.innerHeight-150;
  sc = Math.min(mw/W, mh/H);
  C.width = W*sc; C.height = H*sc;
  X.setTransform(sc,0,0,sc,0,0);
}
resize();
window.addEventListener('resize', () => { resize(); draw(); });

/*
  LAYOUT (per Wikipedia / official rules):
  - Rectangular table, pocket centered on each short rail (top & bottom center)
  - 2 bumpers flank each pocket (one on each side)
  - Center: 8 bumpers in a cross shape
    - Vertical arm (aligned with pockets): 2 bumpers above center, 2 below
    - Horizontal arm: 2 bumpers left of center, 2 right
    - Gap in the exact center big enough for one ball to pass
  - Red balls (Justin) start near bottom, white (Morpheus) near top
  - Each player sinks into the pocket at the OPPOSITE end
*/

// Justin (red) starts BOTTOM, sinks at TOP pocket
// Morpheus (white) starts TOP, sinks at BOTTOM pocket
const POCKETS = [
  { x: CX, y: IT, forPlayer: 'justin' },    // top pocket — Justin sinks here
  { x: CX, y: IB, forPlayer: 'morpheus' },   // bottom pocket — Morpheus sinks here
];

// Bumpers
const G = BR*2.8; // gap size at center
const ARM_INNER = G/2 + BPR + 2;
const ARM_OUTER = ARM_INNER + BPR*2 + 12;

const BUMPERS = [
  // Flanking TOP pocket — one on each side, spread wider
  { x: CX - 42, y: IT + 20 },
  { x: CX + 42, y: IT + 20 },
  // Flanking BOTTOM pocket
  { x: CX - 42, y: IB - 20 },
  { x: CX + 42, y: IB - 20 },

  // Center cross — vertical arm
  { x: CX, y: CY - ARM_OUTER },
  { x: CX, y: CY - ARM_INNER },
  { x: CX, y: CY + ARM_INNER },
  { x: CX, y: CY + ARM_OUTER },

  // Center cross — horizontal arm
  { x: CX - ARM_OUTER, y: CY },
  { x: CX - ARM_INNER, y: CY },
  { x: CX + ARM_INNER, y: CY },
  { x: CX + ARM_OUTER, y: CY },
];

let balls, curP, over, phase, brk, breakShooting, sel, aim, firing, sunk, af;
let breakShots = { justin: null, morpheus: null }; // stored {ball, vx, vy}

function mk(x,y,col,pl,m) { return {x,y,vx:0,vy:0,col,pl,m,out:false}; }

function initGame() {
  document.getElementById('ov').classList.remove('show');
  over=false; phase='break'; brk={justin:false,morpheus:false}; // tracks who HAS shot
  breakShooting=false; // true while break shots are in motion
  curP='justin'; sel=null; aim=null; firing=false; sunk=false;

  // Balls near OWN pocket end. Marked ball in front of own pocket.
  // Justin near bottom, Morpheus near top.
  // "near each edge of the table by a pocket" — balls line up near the pocket they're closest to
  // but they SINK at the OPPOSITE pocket.

  // Official setup: Marked ball directly in front of pocket.
  // 4 remaining balls: 2 on each side of the pocket bumpers, in a half-moon arc.
  // Flanking bumpers are at x = CX±42, so balls go just outside those bumpers.

  balls = [
    // Justin (red) — near BOTTOM pocket (Morpheus's target)
    mk(CX, IB - 32, '#dd3333', 'justin', true),     // marked, directly in front
    mk(CX - 52, IB - 28, '#cc2222', 'justin', false), // left of left bumper
    mk(CX - 78, IB - 40, '#cc2222', 'justin', false), // far left
    mk(CX + 52, IB - 28, '#cc2222', 'justin', false), // right of right bumper
    mk(CX + 78, IB - 40, '#cc2222', 'justin', false), // far right

    // Morpheus (white) — near TOP pocket (Justin's target)
    mk(CX, IT + 32, '#dddddd', 'morpheus', true),
    mk(CX - 52, IT + 28, '#cccccc', 'morpheus', false),
    mk(CX - 78, IT + 40, '#cccccc', 'morpheus', false),
    mk(CX + 52, IT + 28, '#cccccc', 'morpheus', false),
    mk(CX + 78, IT + 40, '#cccccc', 'morpheus', false),
  ];

  hud();
  if(af) cancelAnimationFrame(af);
  loop();
}

function hud() {
  const jl = balls.filter(b=>b.pl==='justin'&&!b.out).length;
  const ml = balls.filter(b=>b.pl==='morpheus'&&!b.out).length;
  document.getElementById('jd').innerHTML = `<span style="color:#e05555">${'●'.repeat(jl)}</span><span style="color:#333">${'○'.repeat(5-jl)}</span>`;
  document.getElementById('md').innerHTML = `<span style="color:#ccc">${'●'.repeat(ml)}</span><span style="color:#333">${'○'.repeat(5-ml)}</span>`;
  if(over) return;
  const ti = document.getElementById('ti');
  const pm = document.getElementById('pm');
  if(phase==='break') {
    if(breakShooting) {
      ti.textContent = 'BREAK!';
      pm.textContent = '';
    } else if(!brk.justin && !brk.morpheus) {
      ti.textContent = 'SIMULTANEOUS BREAK';
      pm.textContent = 'Justin: aim your red marked ball';
    } else if(brk.justin && !brk.morpheus) {
      ti.textContent = 'SIMULTANEOUS BREAK';
      pm.textContent = 'Morpheus: aim your white marked ball';
    } else {
      ti.textContent = 'BREAK!';
      pm.textContent = 'Launching...';
    }
  } else {
    ti.textContent = curP==='justin' ? "Justin's turn 🔴" : "Morpheus's turn ⚪";
    const mb = balls.find(b=>b.pl===curP&&b.m);
    pm.textContent = (mb&&!mb.out) ? 'Must pocket marked ball first' : '';
  }
}

function activeP() {
  if(phase==='break') {
    // During break, whichever player hasn't aimed yet can aim
    if(!brk.justin) return 'justin';
    if(!brk.morpheus) return 'morpheus';
    return null; // both have aimed, waiting for launch
  }
  return curP;
}

function moving() { return balls.some(b=>!b.out&&(Math.abs(b.vx)>0.04||Math.abs(b.vy)>0.04)); }

function stopped() {
  chkWin(); if(over) return;
  if(phase==='break') {
    // Break is done — both balls have stopped
    breakShooting = false;
    phase = 'play';
    // Determine who goes first: whoever pocketed or is closest to their target pocket
    const jm = balls.find(b=>b.pl==='justin'&&b.m);
    const mm = balls.find(b=>b.pl==='morpheus'&&b.m);
    if(jm.out && !mm.out) curP = 'justin';
    else if(mm.out && !jm.out) curP = 'morpheus';
    else {
      // Neither or both sunk — compare distance to target pocket
      const jTarget = POCKETS.find(p=>p.forPlayer==='justin');
      const mTarget = POCKETS.find(p=>p.forPlayer==='morpheus');
      const jDist = jm.out ? 0 : Math.hypot(jm.x-jTarget.x, jm.y-jTarget.y);
      const mDist = mm.out ? 0 : Math.hypot(mm.x-mTarget.x, mm.y-mTarget.y);
      curP = jDist <= mDist ? 'justin' : 'morpheus';
    }
  } else {
    if(!sunk) curP = curP==='justin'?'morpheus':'justin';
  }
  sunk=false; sel=null; aim=null; hud();
}

function chkWin() {
  const jd = balls.filter(b=>b.pl==='justin'&&!b.out).length===0;
  const md = balls.filter(b=>b.pl==='morpheus'&&!b.out).length===0;
  if(jd||md) {
    over=true;
    document.getElementById('wt').textContent = jd ? 'JUSTIN WINS! 🔴' : 'MORPHEUS WINS! ⚪';
    document.getElementById('ov').classList.add('show');
    hud();
  }
}

function phys() {
  if(!moving()) return;
  const F = 0.985;
  for(let b of balls) {
    if(b.out) continue;
    b.x += b.vx; b.y += b.vy;
    b.vx *= F; b.vy *= F;
    if(Math.abs(b.vx)<0.04) b.vx=0;
    if(Math.abs(b.vy)<0.04) b.vy=0;

    // Walls — but leave gap for pockets
    // Top wall: gap at pocket
    if(b.y - BR < IT) {
      if(Math.abs(b.x - CX) > PR+4) { // not near pocket
        b.y = IT+BR; b.vy = Math.abs(b.vy)*0.82;
      }
    }
    // Bottom wall: gap at pocket
    if(b.y + BR > IB) {
      if(Math.abs(b.x - CX) > PR+4) {
        b.y = IB-BR; b.vy = -Math.abs(b.vy)*0.82;
      }
    }
    // Side walls (no pockets on sides)
    if(b.x - BR < IL) { b.x = IL+BR; b.vx = Math.abs(b.vx)*0.82; }
    if(b.x + BR > IR) { b.x = IR-BR; b.vx = -Math.abs(b.vx)*0.82; }

    // Bumpers
    for(let bp of BUMPERS) {
      const dx=b.x-bp.x, dy=b.y-bp.y;
      const d = Math.hypot(dx,dy);
      const mn = BR+BPR;
      if(d<mn && d>0.01) {
        const nx=dx/d, ny=dy/d;
        const dot = b.vx*nx+b.vy*ny;
        if(dot<0) { b.vx -= 2.05*dot*nx; b.vy -= 2.05*dot*ny; }
        b.x = bp.x+nx*(mn+0.5); b.y = bp.y+ny*(mn+0.5);
      }
    }

    // Pockets
    for(let p of POCKETS) {
      if(Math.hypot(b.x-p.x, b.y-p.y) < PSINK) {
        if(p.forPlayer === b.pl) {
          // Correct pocket
          const mb = balls.find(mm=>mm.pl===b.pl&&mm.m);
          if(mb && !mb.out && b!==mb) {
            // Non-marked before marked — bounce out (penalty)
            bounce(b,p);
          } else {
            b.out=true; b.vx=0; b.vy=0; sunk=true;
          }
        } else {
          // Wrong pocket — bounce out
          bounce(b,p);
        }
      }
    }
  }

  // Ball-ball
  for(let i=0;i<balls.length;i++) {
    for(let j=i+1;j<balls.length;j++) {
      const a=balls[i],b=balls[j];
      if(a.out||b.out) continue;
      const dx=b.x-a.x, dy=b.y-a.y;
      const d=Math.hypot(dx,dy);
      if(d<BR*2 && d>0.01) {
        const nx=dx/d,ny=dy/d;
        const imp=(a.vx-b.vx)*nx+(a.vy-b.vy)*ny;
        if(imp>0) { a.vx-=imp*nx; a.vy-=imp*ny; b.vx+=imp*nx; b.vy+=imp*ny; }
        const ov=BR*2-d;
        a.x-=nx*ov/2; a.y-=ny*ov/2; b.x+=nx*ov/2; b.y+=ny*ov/2;
      }
    }
  }

  // Keep in bounds (safety)
  for(let b of balls) {
    if(b.out) continue;
    b.x = Math.max(IL+BR, Math.min(IR-BR, b.x));
    b.y = Math.max(IT+BR, Math.min(IB-BR, b.y));
  }
}

function bounce(b,p) {
  const dx=b.x-p.x, dy=b.y-p.y;
  const d=Math.hypot(dx,dy)||1;
  b.vx = (dx/d)*5; b.vy = (dy/d)*5;
  b.x = p.x+(dx/d)*(PSINK+BR+4);
  b.y = p.y+(dy/d)*(PSINK+BR+4);
}

function draw() {
  X.clearRect(0,0,W,H);

  // Wood rail
  const wg = X.createLinearGradient(0,0,W,H);
  wg.addColorStop(0,'#9B6B3A'); wg.addColorStop(0.5,'#B07D4A'); wg.addColorStop(1,'#8A5A2C');
  X.fillStyle=wg; X.beginPath(); X.roundRect(0,0,W,H,10); X.fill();

  // Rail detail lines
  X.strokeStyle='rgba(0,0,0,0.15)'; X.lineWidth=1;
  X.strokeRect(4,4,W-8,H-8);
  X.strokeRect(RAIL-2,RAIL-2,W-RAIL*2+4,H-RAIL*2+4);

  // Felt
  const fg = X.createRadialGradient(CX,CY,30,CX,CY,380);
  fg.addColorStop(0,'#2a7050'); fg.addColorStop(1,'#1b4332');
  X.fillStyle=fg; X.fillRect(IL,IT,IR-IL,IB-IT);

  // Pocket cutouts in rail
  for(let p of POCKETS) {
    // Dark pocket hole
    X.save();
    X.beginPath(); X.arc(p.x, p.y, PR+2, 0, Math.PI*2);
    X.fillStyle='#0a0a0a'; X.fill();
    // Inner
    X.beginPath(); X.arc(p.x, p.y, PR, 0, Math.PI*2);
    X.fillStyle='#111'; X.fill();
    // Colored rim
    const pc = p.forPlayer==='justin' ? '#cc3333' : '#aaa';
    X.strokeStyle=pc; X.lineWidth=3; X.stroke();
    X.restore();
  }

  // Bumpers
  for(let bp of BUMPERS) {
    X.beginPath(); X.arc(bp.x+1.5,bp.y+1.5,BPR,0,Math.PI*2);
    X.fillStyle='rgba(0,0,0,0.3)'; X.fill();
    const bg=X.createRadialGradient(bp.x-3,bp.y-3,1,bp.x,bp.y,BPR);
    bg.addColorStop(0,'#f0d050'); bg.addColorStop(0.5,'#c9a830'); bg.addColorStop(1,'#8b6508');
    X.beginPath(); X.arc(bp.x,bp.y,BPR,0,Math.PI*2);
    X.fillStyle=bg; X.fill();
    X.strokeStyle='#d4af37'; X.lineWidth=1; X.stroke();
  }

  // Aim arrow
  if(sel && aim && !moving()) {
    const dx=sel.x-aim.x, dy=sel.y-aim.y;
    const len=Math.hypot(dx,dy);
    if(len>10) {
      const nx=dx/len,ny=dy/len;
      const pwr=Math.min(len/15,1);
      const tl=30+pwr*70;
      X.save();
      X.setLineDash([5,4]);
      X.strokeStyle=`rgba(255,255,180,${0.4+pwr*0.5})`; X.lineWidth=2;
      X.beginPath(); X.moveTo(sel.x,sel.y); X.lineTo(sel.x+nx*tl,sel.y+ny*tl); X.stroke();
      X.setLineDash([]);
      const tx=sel.x+nx*tl, ty=sel.y+ny*tl;
      X.beginPath(); X.moveTo(tx,ty);
      X.lineTo(tx-nx*12-ny*6,ty-ny*12+nx*6);
      X.lineTo(tx-nx*12+ny*6,ty-ny*12-nx*6);
      X.closePath(); X.fillStyle='rgba(255,255,180,0.85)'; X.fill();
      // Power bar
      X.fillStyle = pwr<0.5?'#4a4':'#c44';
      X.fillRect(IL+6,IB-16,pwr*60,6);
      X.strokeStyle='#555'; X.lineWidth=1; X.strokeRect(IL+6,IB-16,60,6);
      X.restore();
    }
  }

  // Balls
  for(let b of balls) {
    if(b.out) continue;
    X.beginPath(); X.arc(b.x+1.5,b.y+1.5,BR,0,Math.PI*2);
    X.fillStyle='rgba(0,0,0,0.35)'; X.fill();
    const gr=X.createRadialGradient(b.x-2,b.y-2,1,b.x,b.y,BR);
    gr.addColorStop(0,lt(b.col,50)); gr.addColorStop(0.5,b.col); gr.addColorStop(1,dk(b.col,40));
    X.beginPath(); X.arc(b.x,b.y,BR,0,Math.PI*2);
    X.fillStyle=gr; X.fill();
    X.strokeStyle='rgba(0,0,0,0.25)'; X.lineWidth=0.8; X.stroke();
    if(b.m) {
      X.beginPath(); X.arc(b.x,b.y,BR*0.35,0,Math.PI*2);
      X.fillStyle = b.pl==='justin'?'#fff':'#444'; X.fill();
    }
    if(b===sel) {
      X.beginPath(); X.arc(b.x,b.y,BR+4,0,Math.PI*2);
      X.strokeStyle='#ffe866'; X.lineWidth=2.5; X.stroke();
    }
  }

  // Labels on the felt, away from balls
  X.save();
  X.fillStyle='rgba(255,255,255,0.18)';
  X.font='bold 9px Georgia'; X.textAlign='center';
  X.fillText('JUSTIN →', CX, IT + 52);
  X.fillText('← MORPHEUS', CX, IB - 44);
  X.restore();
}

function lt(h,a) {
  return `rgb(${Math.min(255,parseInt(h.slice(1,3),16)+a)},${Math.min(255,parseInt(h.slice(3,5),16)+a)},${Math.min(255,parseInt(h.slice(5,7),16)+a)})`;
}
function dk(h,a) {
  return `rgb(${Math.max(0,parseInt(h.slice(1,3),16)-a)},${Math.max(0,parseInt(h.slice(3,5),16)-a)},${Math.max(0,parseInt(h.slice(5,7),16)-a)})`;
}

function loop() {
  if(over){draw();return;}
  const was=moving();
  phys(); draw();
  if(was && !moving() && firing) { firing=false; stopped(); }
  af=requestAnimationFrame(loop);
}

function gp(e) {
  const r=C.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  return {x:(cx-r.left)/sc,y:(cy-r.top)/sc};
}

function onD(e) {
  e.preventDefault();
  if(over||moving()||firing) return;
  const p=gp(e);
  if(phase==='break') {
    // During break, let the next un-aimed player pick their marked ball
    const a = activeP();
    if(!a) return; // both aimed, waiting
    const mb = balls.find(b=>b.pl===a&&b.m);
    if(mb && !mb.out && Math.hypot(p.x-mb.x,p.y-mb.y)<BR+14) {
      sel=mb; aim=p;
    }
    return;
  }
  const a=activeP();
  for(let b of balls) {
    if(b.out||b.pl!==a) continue;
    if(Math.hypot(p.x-b.x,p.y-b.y)<BR+14) {
      const mb=balls.find(mm=>mm.pl===a&&mm.m);
      if(mb&&!mb.out&&b!==mb) continue;
      sel=b; aim=p; return;
    }
  }
}
function onM(e) { e.preventDefault(); if(sel) aim=gp(e); }
function onU(e) {
  e.preventDefault();
  if(!sel||!aim) return;
  const dx=sel.x-aim.x,dy=sel.y-aim.y,len=Math.hypot(dx,dy);
  if(len>10) {
    const pwr=Math.min(len/15,1)*16;
    if(phase==='break') {
      // Store shot, don't fire yet
      const pl = sel.pl;
      breakShots[pl] = { ball: sel, vx: (dx/len)*pwr, vy: (dy/len)*pwr };
      brk[pl] = true; // mark as aimed
      sel=null; aim=null;
      hud();
      // If both have aimed, fire simultaneously
      if(brk.justin && brk.morpheus) {
        breakShots.justin.ball.vx = breakShots.justin.vx;
        breakShots.justin.ball.vy = breakShots.justin.vy;
        breakShots.morpheus.ball.vx = breakShots.morpheus.vx;
        breakShots.morpheus.ball.vy = breakShots.morpheus.vy;
        breakShooting = true;
        firing = true; sunk = false;
        hud();
      }
      return;
    }
    sel.vx=(dx/len)*pwr; sel.vy=(dy/len)*pwr;
    firing=true; sunk=false;
  }
  sel=null; aim=null;
}

C.addEventListener('mousedown',onD);
C.addEventListener('mousemove',onM);
C.addEventListener('mouseup',onU);
C.addEventListener('touchstart',onD,{passive:false});
C.addEventListener('touchmove',onM,{passive:false});
C.addEventListener('touchend',onU,{passive:false});

initGame();
</script>
</body>
</html>
