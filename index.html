<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bumper Pool — Justin vs Morpheus</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    font-family: 'Georgia', serif;
    color: #f0e6d3;
    padding: 10px;
  }
  h1 {
    font-size: 1.3em;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #c9a84c;
    margin-bottom: 6px;
    text-shadow: 0 0 10px rgba(201,168,76,0.4);
  }
  #scoreboard {
    display: flex;
    gap: 20px;
    margin-bottom: 8px;
    background: rgba(0,0,0,0.4);
    padding: 7px 18px;
    border-radius: 8px;
    border: 1px solid #c9a84c44;
    align-items: center;
  }
  .player-info { text-align: center; min-width: 90px; }
  .player-name { font-size: 0.95em; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
  .player-name.red { color: #e05555; }
  .player-name.gray { color: #ccc; }
  .ball-dots { font-size: 1.1em; margin-top: 2px; letter-spacing: 1px; }
  #turn-box { text-align: center; min-width: 110px; }
  #turn-indicator { font-size: 0.85em; color: #c9a84c; }
  #phase-msg { font-size: 0.75em; color: #aaa; margin-top: 3px; min-height: 16px; }
  canvas { border-radius: 6px; cursor: crosshair; touch-action: none; max-width: 100%; }
  #instructions { font-size: 0.72em; color: #666; margin-top: 6px; text-align: center; }
  #overlay {
    display: none; position: fixed; top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.85);
    flex-direction: column; align-items: center; justify-content: center; z-index: 10;
  }
  #overlay.show { display: flex; }
  #winner-text { font-size: 2.2em; color: #c9a84c; text-shadow: 0 0 20px rgba(201,168,76,0.8); margin-bottom: 20px; text-align: center; padding: 0 20px; }
  #replay-btn {
    background: #c9a84c; color: #1a1a2e; border: none;
    padding: 12px 30px; font-size: 1.05em; font-family: 'Georgia', serif;
    text-transform: uppercase; letter-spacing: 2px; border-radius: 4px; cursor: pointer; font-weight: bold;
  }
  #replay-btn:hover { background: #e0c070; }
</style>
</head>
<body>
<h1>⚫ Bumper Pool ⚫</h1>
<div id="scoreboard">
  <div class="player-info">
    <div class="player-name red">Justin 🔴</div>
    <div class="ball-dots" id="justin-dots">●●●●●</div>
  </div>
  <div id="turn-box">
    <div id="turn-indicator">—</div>
    <div id="phase-msg"></div>
  </div>
  <div class="player-info">
    <div class="player-name gray">Morpheus ⚪</div>
    <div class="ball-dots" id="morpheus-dots">●●●●●</div>
  </div>
</div>
<canvas id="c"></canvas>
<div id="instructions">Click your ball · Drag to aim · Release to shoot</div>
<div id="overlay">
  <div id="winner-text"></div>
  <button id="replay-btn" onclick="initGame()">Play Again</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const BASE_W = 480, BASE_H = 700;
let scale = 1;

function resize() {
  const maxW = Math.min(window.innerWidth - 20, BASE_W);
  const maxH = window.innerHeight - 170;
  scale = Math.min(maxW / BASE_W, maxH / BASE_H);
  canvas.width = BASE_W * scale;
  canvas.height = BASE_H * scale;
  ctx.setTransform(scale, 0, 0, scale, 0, 0);
}
resize();
window.addEventListener('resize', () => { resize(); draw(); });

const RAIL = 30;
const IL = RAIL, IR = BASE_W - RAIL, IT = RAIL, IB = BASE_H - RAIL;
const CX = BASE_W / 2, CY = BASE_H / 2;
const BALL_R = 11, BUMPER_R = 13, POCKET_R = 13;

// ONE pocket per player, centered on their end rail
// Justin (red) pockets at BOTTOM center, Morpheus (gray) pockets at TOP center
const POCKETS = [
  { x: CX, y: IB, player: 'justin',   color: '#cc2222', label: 'Red Cup'   },
  { x: CX, y: IT, player: 'morpheus', color: '#bbbbbb', label: 'White Cup' },
];

// Bumpers: standard cross pattern
const BUMPERS = [
  // Center cross
  { x: CX,      y: CY      },
  { x: CX - 50, y: CY      },
  { x: CX + 50, y: CY      },
  { x: CX,      y: CY - 50 },
  { x: CX,      y: CY + 50 },
  // Surrounding the cross arms
  { x: CX - 50, y: CY - 35 },
  { x: CX + 50, y: CY - 35 },
  { x: CX - 50, y: CY + 35 },
  { x: CX + 50, y: CY + 35 },
];

// Game state
let balls, currentPlayer, gameOver, phase;
let breakPending;
let selectedBall, aimCurrent;
let pocketedThisTurn;
let shotInFlight = false;
let animFrame;

function makeBall(x, y, baseColor, markedColor, player, marked) {
  return { x, y, vx: 0, vy: 0, baseColor, markedColor, player, marked, pocketed: false, markedPocketed: false };
}

function initGame() {
  document.getElementById('overlay').classList.remove('show');
  gameOver = false;
  phase = 'break';
  breakPending = { justin: true, morpheus: true }; // both must shoot
  currentPlayer = 'justin';
  selectedBall = null; aimCurrent = null;
  pocketedThisTurn = false;
  moving = false;

  // Justin = red. Red balls start at TOP (near Morpheus's white cup).
  // Justin's marked ball sits directly in front of the WHITE cup.
  // Morpheus = white. White balls start at BOTTOM (near Justin's red cup).
  // Morpheus's marked ball sits directly in front of the RED cup.

  const jMarkedX = CX, jMarkedY = IT + 40; // marked red ball in front of white cup
  const mMarkedX = CX, mMarkedY = IB - 40; // marked white ball in front of red cup

  balls = [
    // Justin's red balls — start at top, 2 on each side of white pocket + marked in front
    makeBall(jMarkedX,    jMarkedY,      '#dd2222', '#ffffff', 'justin',   true),  // marked
    makeBall(CX - 38,     IT + 30,       '#cc2222', null,      'justin',   false),
    makeBall(CX + 38,     IT + 30,       '#cc2222', null,      'justin',   false),
    makeBall(CX - 65,     IT + 55,       '#cc2222', null,      'justin',   false),
    makeBall(CX + 65,     IT + 55,       '#cc2222', null,      'justin',   false),

    // Morpheus's white/gray balls — start at bottom, around red pocket
    makeBall(mMarkedX,    mMarkedY,      '#cccccc', '#555555', 'morpheus', true),  // marked
    makeBall(CX - 38,     IB - 30,       '#bbbbbb', null,      'morpheus', false),
    makeBall(CX + 38,     IB - 30,       '#bbbbbb', null,      'morpheus', false),
    makeBall(CX - 65,     IB - 55,       '#bbbbbb', null,      'morpheus', false),
    makeBall(CX + 65,     IB - 55,       '#bbbbbb', null,      'morpheus', false),
  ];

  updateHUD();
  if (animFrame) cancelAnimationFrame(animFrame);
  loop();
}

function updateHUD() {
  const jLeft = balls.filter(b => b.player === 'justin' && !b.pocketed).length;
  const mLeft = balls.filter(b => b.player === 'morpheus' && !b.pocketed).length;
  document.getElementById('justin-dots').textContent = '●'.repeat(jLeft) + '○'.repeat(5 - jLeft);
  document.getElementById('morpheus-dots').textContent = '●'.repeat(mLeft) + '○'.repeat(5 - mLeft);

  if (gameOver) return;

  const turnEl = document.getElementById('turn-indicator');
  const phaseEl = document.getElementById('phase-msg');

  if (phase === 'break') {
    turnEl.textContent = 'Opening Break';
    const jDone = !breakPending.justin, mDone = !breakPending.morpheus;
    if (!jDone && !mDone) phaseEl.textContent = 'Both shoot simultaneously';
    else if (!jDone) phaseEl.textContent = 'Justin shoots first';
    else if (!mDone) phaseEl.textContent = 'Morpheus shoots next';
    else phaseEl.textContent = '';
  } else {
    turnEl.textContent = currentPlayer === 'justin' ? "Justin's turn 🔴" : "Morpheus's turn ⚪";
    // Check if marked ball still needed
    const player = currentPlayer;
    const markedBall = balls.find(b => b.player === player && b.marked);
    if (markedBall && !markedBall.pocketed && !markedBall.markedPocketed) {
      phaseEl.textContent = 'Pocket marked ball first';
    } else {
      phaseEl.textContent = '';
    }
  }
}

function getActivePlayer() {
  if (phase === 'break') {
    if (breakPending.justin) return 'justin';
    if (breakPending.morpheus) return 'morpheus';
  }
  return currentPlayer;
}

function anyMoving() {
  return balls.some(b => !b.pocketed && (Math.abs(b.vx) > 0.06 || Math.abs(b.vy) > 0.06));
}

let lastMoving = false;

function onBallsStopped() {
  // Check pockets
  for (let b of balls) {
    if (!b.pocketed) continue;
    if (b.marked) b.markedPocketed = true;
  }
  checkWin();
  if (gameOver) return;

  if (phase === 'break') {
    // Determine who shot first — whoever's breakPending is already cleared
    if (!breakPending.justin && breakPending.morpheus) {
      // Justin shot, now Morpheus shoots
      // (already handled — we just wait for Morpheus)
    } else {
      // Both have shot, break is over
      phase = 'play';
      // Whoever pocketed or was nearest — simplified: Justin goes first
      currentPlayer = 'justin';
      pocketedThisTurn = false;
    }
  } else {
    if (!pocketedThisTurn) {
      currentPlayer = currentPlayer === 'justin' ? 'morpheus' : 'justin';
    }
    pocketedThisTurn = false;
  }
  selectedBall = null;
  aimCurrent = null;
  updateHUD();
}

function checkWin() {
  const jDone = balls.filter(b => b.player === 'justin' && !b.pocketed).length === 0;
  const mDone = balls.filter(b => b.player === 'morpheus' && !b.pocketed).length === 0;
  if (jDone || mDone) {
    gameOver = true;
    document.getElementById('winner-text').textContent = jDone ? 'JUSTIN WINS! 🔴' : 'MORPHEUS WINS! ⚪';
    document.getElementById('overlay').classList.add('show');
    updateHUD();
  }
}

function physics() {
  if (!anyMoving()) return;
  const FRIC = 0.984;
  for (let b of balls) {
    if (b.pocketed) continue;
    b.x += b.vx; b.y += b.vy;
    b.vx *= FRIC; b.vy *= FRIC;
    if (Math.abs(b.vx) < 0.06) b.vx = 0;
    if (Math.abs(b.vy) < 0.06) b.vy = 0;

    // Walls
    if (b.x - BALL_R < IL) { b.x = IL + BALL_R; b.vx = Math.abs(b.vx) * 0.85; }
    if (b.x + BALL_R > IR) { b.x = IR - BALL_R; b.vx = -Math.abs(b.vx) * 0.85; }
    if (b.y - BALL_R < IT) { b.y = IT + BALL_R; b.vy = Math.abs(b.vy) * 0.85; }
    if (b.y + BALL_R > IB) { b.y = IB - BALL_R; b.vy = -Math.abs(b.vy) * 0.85; }

    // Bumpers
    for (let bmp of BUMPERS) {
      const dx = b.x - bmp.x, dy = b.y - bmp.y;
      const dist = Math.hypot(dx, dy);
      const min = BALL_R + BUMPER_R;
      if (dist < min && dist > 0.01) {
        const nx = dx/dist, ny = dy/dist;
        const dot = b.vx*nx + b.vy*ny;
        if (dot < 0) { b.vx -= 2*dot*nx; b.vy -= 2*dot*ny; }
        b.x = bmp.x + nx*(min + 0.5); b.y = bmp.y + ny*(min + 0.5);
      }
    }

    // Pockets
    for (let p of POCKETS) {
      if (Math.hypot(b.x - p.x, b.y - p.y) < POCKET_R) {
        // Check rule: marked ball must be pocketed first by this player
        const myMarked = balls.find(mb => mb.player === b.player && mb.marked);
        const markedFirst = !myMarked || myMarked.pocketed || myMarked === b;
        if (p.player === b.player && markedFirst) {
          b.pocketed = true; b.vx = 0; b.vy = 0;
          pocketedThisTurn = true;
        } else if (p.player !== b.player) {
          // Wrong pocket — bounce out (simple: reverse velocity)
          b.vx *= -0.6; b.vy *= -0.6;
          // Nudge away
          const dx = b.x - p.x, dy = b.y - p.y;
          const d = Math.hypot(dx, dy) || 1;
          b.x = p.x + (dx/d)*(POCKET_R + BALL_R + 2);
          b.y = p.y + (dy/d)*(POCKET_R + BALL_R + 2);
        }
      }
    }
  }

  // Ball-ball collisions
  for (let i = 0; i < balls.length; i++) {
    for (let j = i+1; j < balls.length; j++) {
      const a = balls[i], b = balls[j];
      if (a.pocketed || b.pocketed) continue;
      const dx = b.x-a.x, dy = b.y-a.y;
      const dist = Math.hypot(dx, dy);
      if (dist < BALL_R*2 && dist > 0.01) {
        const nx = dx/dist, ny = dy/dist;
        const imp = (a.vx-b.vx)*nx + (a.vy-b.vy)*ny;
        if (imp > 0) {
          a.vx -= imp*nx; a.vy -= imp*ny;
          b.vx += imp*nx; b.vy += imp*ny;
        }
        const ov = BALL_R*2 - dist;
        a.x -= nx*ov/2; a.y -= ny*ov/2;
        b.x += nx*ov/2; b.y += ny*ov/2;
      }
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, BASE_W, BASE_H);

  // Wood rail
  const wg = ctx.createLinearGradient(0, 0, BASE_W, BASE_H);
  wg.addColorStop(0, '#9B6B3A'); wg.addColorStop(0.5, '#B07D4A'); wg.addColorStop(1, '#8A5A2C');
  ctx.fillStyle = wg;
  ctx.beginPath(); ctx.roundRect(0, 0, BASE_W, BASE_H, 12); ctx.fill();

  // Felt
  const fg = ctx.createRadialGradient(CX, CY, 40, CX, CY, 340);
  fg.addColorStop(0, '#2d6a4f'); fg.addColorStop(1, '#1b4332');
  ctx.fillStyle = fg;
  ctx.fillRect(IL, IT, IR-IL, IB-IT);

  // Center dividing line (faint)
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1; ctx.setLineDash([8, 6]);
  ctx.beginPath(); ctx.moveTo(IL, CY); ctx.lineTo(IR, CY); ctx.stroke();
  ctx.setLineDash([]);

  // Zone labels
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.font = '11px Georgia';
  ctx.textAlign = 'center';
  ctx.fillText('JUSTIN starts here', CX, IT + 18);
  ctx.fillText('MORPHEUS starts here', CX, IB - 8);

  // Pockets
  for (let p of POCKETS) {
    ctx.beginPath(); ctx.arc(p.x, p.y, POCKET_R + 5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x, p.y, POCKET_R, 0, Math.PI*2);
    ctx.fillStyle = '#0a0a0a'; ctx.fill();
    ctx.strokeStyle = p.color; ctx.lineWidth = 2.5; ctx.stroke();
    // Label
    ctx.fillStyle = p.color; ctx.font = 'bold 9px Georgia'; ctx.textAlign = 'center';
    const labelY = p.player === 'morpheus' ? p.y - POCKET_R - 5 : p.y + POCKET_R + 12;
    ctx.fillText(p.label, p.x, labelY);
  }

  // Bumpers
  for (let bmp of BUMPERS) {
    ctx.beginPath(); ctx.arc(bmp.x+2, bmp.y+2, BUMPER_R, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fill();
    const bg = ctx.createRadialGradient(bmp.x-3, bmp.y-3, 1, bmp.x, bmp.y, BUMPER_R);
    bg.addColorStop(0, '#e8c94a'); bg.addColorStop(0.6, '#c9a830'); bg.addColorStop(1, '#8b6508');
    ctx.beginPath(); ctx.arc(bmp.x, bmp.y, BUMPER_R, 0, Math.PI*2);
    ctx.fillStyle = bg; ctx.fill();
    ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 1.2; ctx.stroke();
  }

  // Aim arrow
  if (selectedBall && aimCurrent && !anyMoving()) {
    const dx = selectedBall.x - aimCurrent.x;
    const dy = selectedBall.y - aimCurrent.y;
    const len = Math.hypot(dx, dy);
    if (len > 8) {
      const nx = dx/len, ny = dy/len;
      const tipX = selectedBall.x + nx*90, tipY = selectedBall.y + ny*90;
      ctx.save();
      ctx.setLineDash([5, 4]);
      ctx.strokeStyle = 'rgba(255,255,180,0.7)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(selectedBall.x, selectedBall.y); ctx.lineTo(tipX, tipY); ctx.stroke();
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(tipX, tipY);
      ctx.lineTo(tipX - nx*14 - ny*7, tipY - ny*14 + nx*7);
      ctx.lineTo(tipX - nx*14 + ny*7, tipY - ny*14 - nx*7);
      ctx.closePath(); ctx.fillStyle = 'rgba(255,255,180,0.9)'; ctx.fill();
      ctx.restore();
      // Power indicator
      const power = Math.min(len/12, 1);
      ctx.fillStyle = `rgba(${Math.round(255*power)},${Math.round(180*(1-power))},0,0.8)`;
      ctx.font = '10px Georgia'; ctx.textAlign = 'left';
      ctx.fillText(`Power: ${Math.round(power*100)}%`, IL + 4, IB - 6);
    }
  }

  // Balls
  for (let b of balls) {
    if (b.pocketed) continue;
    // Shadow
    ctx.beginPath(); ctx.arc(b.x+2, b.y+2, BALL_R, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fill();
    // Body
    const gr = ctx.createRadialGradient(b.x-3, b.y-3, 1, b.x, b.y, BALL_R);
    gr.addColorStop(0, lighten(b.baseColor, 55));
    gr.addColorStop(0.5, b.baseColor);
    gr.addColorStop(1, darken(b.baseColor, 40));
    ctx.beginPath(); ctx.arc(b.x, b.y, BALL_R, 0, Math.PI*2);
    ctx.fillStyle = gr; ctx.fill();
    // Marked dot
    if (b.marked) {
      ctx.beginPath(); ctx.arc(b.x, b.y, BALL_R*0.38, 0, Math.PI*2);
      ctx.fillStyle = b.markedColor; ctx.fill();
    }
    // Selected ring
    if (b === selectedBall) {
      ctx.beginPath(); ctx.arc(b.x, b.y, BALL_R+4, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(255,255,100,1)'; ctx.lineWidth = 2.5; ctx.stroke();
    }
  }
}

function lighten(hex, a) {
  return `rgb(${Math.min(255,parseInt(hex.slice(1,3),16)+a)},${Math.min(255,parseInt(hex.slice(3,5),16)+a)},${Math.min(255,parseInt(hex.slice(5,7),16)+a)})`;
}
function darken(hex, a) {
  return `rgb(${Math.max(0,parseInt(hex.slice(1,3),16)-a)},${Math.max(0,parseInt(hex.slice(3,5),16)-a)},${Math.max(0,parseInt(hex.slice(5,7),16)-a)})`;
}

function loop() {
  if (gameOver) { draw(); return; }
  const wasMoving = anyMoving();
  physics();
  draw();
  const isMoving = anyMoving();
  if (wasMoving && !isMoving && shotInFlight) {
    shotInFlight = false;
    onBallsStopped();
  }
  animFrame = requestAnimationFrame(loop);
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (cx - rect.left)/scale, y: (cy - rect.top)/scale };
}

function canShoot() {
  if (gameOver || anyMoving() || shotInFlight) return false;
  if (phase === 'break') {
    // Both need to shoot; whoever hasn't shot yet can shoot
    const active = getActivePlayer();
    return breakPending[active];
  }
  return true;
}

function onDown(e) {
  e.preventDefault();
  if (!canShoot()) return;
  const pos = getPos(e);
  const active = getActivePlayer();
  for (let b of balls) {
    if (b.pocketed || b.player !== active) continue;
    if (Math.hypot(pos.x - b.x, pos.y - b.y) < BALL_R + 10) {
      // Enforce marked ball first rule
      const myMarked = balls.find(mb => mb.player === active && mb.marked);
      if (myMarked && !myMarked.pocketed && b !== myMarked) continue; // must pick marked first
      selectedBall = b; aimCurrent = pos; return;
    }
  }
}

function onMove(e) {
  e.preventDefault();
  if (!selectedBall) return;
  aimCurrent = getPos(e);
}

function onUp(e) {
  e.preventDefault();
  if (!selectedBall || !aimCurrent) return;
  const dx = selectedBall.x - aimCurrent.x;
  const dy = selectedBall.y - aimCurrent.y;
  const len = Math.hypot(dx, dy);
  if (len > 8) {
    const power = Math.min(len/12, 1) * 20;
    selectedBall.vx = (dx/len) * power;
    selectedBall.vy = (dy/len) * power;
    shotInFlight = true;
    if (phase === 'break') {
      const active = getActivePlayer();
      breakPending[active] = false;
    }
  }
  selectedBall = null;
  aimCurrent = null;
}

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onUp);
canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove', onMove, { passive: false });
canvas.addEventListener('touchend', onUp, { passive: false });

initGame();
</script>
</body>
</html>
